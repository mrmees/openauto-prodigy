{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<h1>Settings</h1>

<form id="settingsForm">
    <div class="card">
        <h3>Wi-Fi Hotspot</h3>
        <div class="form-group">
            <label for="wifi_ssid">SSID</label>
            <input type="text" id="wifi_ssid" value="{{ config.get('wifi_ssid', 'OpenAutoProdigy') }}">
        </div>
        <div class="form-group">
            <label for="wifi_password">Password</label>
            <input type="password" id="wifi_password" value="{{ config.get('wifi_password', '') }}">
        </div>
    </div>

    <div class="card">
        <h3>Android Auto</h3>
        <div class="form-group">
            <label for="tcp_port">TCP Port</label>
            <input type="number" id="tcp_port" value="{{ config.get('tcp_port', 5277) }}" min="1024" max="65535">
        </div>
        <div class="form-group">
            <label for="video_fps">Video FPS</label>
            <select id="video_fps">
                {% for fps in [30, 60] %}
                <option value="{{ fps }}" {{ 'selected' if config.get('video_fps', 30) == fps }}>{{ fps }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="video_resolution">Video Resolution</label>
            <select id="video_resolution">
                {% for res in ['480p', '720p', '1080p'] %}
                <option value="{{ res }}" {{ 'selected' if config.get('video_resolution', '480p') == res }}>{{ res }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="card">
        <h3>Protocol Capture</h3>
        <div class="form-group">
            <label>
                <input type="checkbox" id="protocol_capture_enabled" {{ 'checked' if config.get('protocol_capture_enabled', False) else '' }}>
                Enable capture dumps
            </label>
        </div>
        <div class="form-group">
            <label for="protocol_capture_format">Format</label>
            <select id="protocol_capture_format">
                {% for fmt in ['jsonl', 'tsv'] %}
                <option value="{{ fmt }}" {{ 'selected' if config.get('protocol_capture_format', 'jsonl') == fmt }}>{{ fmt|upper }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" id="protocol_capture_include_media" {{ 'checked' if config.get('protocol_capture_include_media', False) else '' }}>
                Include media payload frames
            </label>
        </div>
        <div class="form-group">
            <label for="protocol_capture_path">Capture Path</label>
            <input type="text" id="protocol_capture_path" value="{{ config.get('protocol_capture_path', '/tmp/oaa-protocol-capture.jsonl') }}">
        </div>
    </div>

    <div class="card">
        <h3>Display</h3>
        <div class="form-group">
            <label for="brightness">Brightness</label>
            <input type="range" id="brightness" min="10" max="100" value="{{ config.get('brightness', 80) }}">
        </div>
        <div class="form-group">
            <label for="night_mode">Night Mode</label>
            <select id="night_mode">
                <option value="auto" {{ 'selected' if config.get('night_mode', 'auto') == 'auto' }}>Auto (sunset)</option>
                <option value="on" {{ 'selected' if config.get('night_mode') == 'on' }}>Always On</option>
                <option value="off" {{ 'selected' if config.get('night_mode') == 'off' }}>Always Off</option>
            </select>
        </div>
    </div>

    <button type="submit">Save Settings</button>
</form>

<div class="card" id="loggingCard">
    <h3>Logging</h3>
    <div class="form-group">
        <label>
            <input type="checkbox" id="log_verbose">
            Verbose logging (all debug output)
        </label>
    </div>
    <div class="form-group">
        <label>Per-category debug (overrides verbose when set):</label>
        <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;">
            <label><input type="checkbox" class="log-cat" value="aa"> AA</label>
            <label><input type="checkbox" class="log-cat" value="bt"> BT</label>
            <label><input type="checkbox" class="log-cat" value="audio"> Audio</label>
            <label><input type="checkbox" class="log-cat" value="plugin"> Plugin</label>
            <label><input type="checkbox" class="log-cat" value="ui"> UI</label>
            <label><input type="checkbox" class="log-cat" value="core"> Core</label>
        </div>
    </div>
    <div id="logStatus" style="font-size: 0.85em; color: #888; margin-top: 4px;"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
// --- Logging controls (live, no form submit needed) ---
(async function initLogging() {
    try {
        const resp = await fetch('/api/logging');
        const data = await resp.json();
        if (data.error) return;

        document.getElementById('log_verbose').checked = !!data.verbose;
        const cats = data.debug_categories || [];
        document.querySelectorAll('.log-cat').forEach(cb => {
            cb.checked = cats.includes(cb.value);
        });
    } catch (e) {
        console.error('Failed to load logging state:', e);
    }
})();

document.getElementById('log_verbose').addEventListener('change', async function() {
    const result = await apiCall('POST', '/api/logging', { verbose: this.checked });
    const status = document.getElementById('logStatus');
    if (result && !result.error) {
        // Clear per-category checkboxes when enabling verbose (verbose overrides)
        if (this.checked) {
            document.querySelectorAll('.log-cat').forEach(cb => cb.checked = false);
        }
        status.textContent = 'Verbose ' + (this.checked ? 'enabled' : 'disabled');
    } else {
        status.textContent = 'Error: ' + (result?.error || 'unknown');
    }
    setTimeout(() => status.textContent = '', 3000);
});

document.querySelectorAll('.log-cat').forEach(cb => {
    cb.addEventListener('change', async function() {
        const selected = [];
        document.querySelectorAll('.log-cat:checked').forEach(c => selected.push(c.value));

        // If any category is selected, turn off verbose toggle
        if (selected.length > 0) {
            document.getElementById('log_verbose').checked = false;
        }

        const result = await apiCall('POST', '/api/logging', { categories: selected });
        const status = document.getElementById('logStatus');
        if (result && !result.error) {
            status.textContent = selected.length ? 'Debug: ' + selected.join(', ') : 'Debug categories cleared';
        } else {
            status.textContent = 'Error: ' + (result?.error || 'unknown');
        }
        setTimeout(() => status.textContent = '', 3000);
    });
});

document.getElementById('settingsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        wifi_ssid: document.getElementById('wifi_ssid').value,
        wifi_password: document.getElementById('wifi_password').value,
        tcp_port: parseInt(document.getElementById('tcp_port').value),
        video_fps: parseInt(document.getElementById('video_fps').value),
        video_resolution: document.getElementById('video_resolution').value,
        protocol_capture_enabled: document.getElementById('protocol_capture_enabled').checked,
        protocol_capture_format: document.getElementById('protocol_capture_format').value,
        protocol_capture_include_media: document.getElementById('protocol_capture_include_media').checked,
        protocol_capture_path: document.getElementById('protocol_capture_path').value,
        brightness: parseInt(document.getElementById('brightness').value),
        night_mode: document.getElementById('night_mode').value,
    };
    const result = await apiCall('POST', '/api/config', data);
    if (result && !result.error) {
        showToast('Settings saved');
    }
});
</script>
{% endblock %}
