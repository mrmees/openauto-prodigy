id: ocean
name: Ocean
version: 2.0.0
font_family: "Lato"

# Day mode colors — cool blue/teal palette
day:
  # Primary group
  primary: "#66c0f4"
  on-primary: "#003048"
  primary-container: "#2a6888"
  on-primary-container: "#c0e0f8"
  # Secondary group
  secondary: "#5a7888"
  on-secondary: "#ffffff"
  secondary-container: "#304858"
  on-secondary-container: "#c0d8e8"
  # Tertiary group
  tertiary: "#4dd0b0"
  on-tertiary: "#003828"
  tertiary-container: "#1a6850"
  on-tertiary-container: "#b0f0d8"
  # Error group
  error: "#cc4444"
  on-error: "#ffffff"
  error-container: "#8c1d18"
  on-error-container: "#ffdad6"
  # Background & surface
  background: "#1b2838"
  on-background: "#e8e8f0"
  surface: "#172030"
  on-surface: "#d0d0e0"
  surface-variant: "#172030"
  on-surface-variant: "#8090a8"
  surface-dim: "#0e1820"
  surface-bright: "#283848"
  surface-container-lowest: "#0a1018"
  surface-container-low: "#1e3a52"
  surface-container: "#1a3048"
  surface-container-high: "#203850"
  surface-container-highest: "#254058"
  # Outline
  outline: "#607888"
  outline-variant: "#d0e0f026"
  # Inverse
  inverse-surface: "#1b2838"
  inverse-on-surface: "#e8e8f0"
  inverse-primary: "#2a6888"
  # Utility
  scrim: "#000000"
  shadow: "#000000"
  # Custom tokens
  text-primary: "#e8e8f0"
  text-secondary: "#8090a8"
  red: "#cc4444"
  on-red: "#ffffff"
  yellow: "#FFB74D"
  on-yellow: "#000000"

# Night mode colors — deeper, less saturated
night:
  # Primary group
  primary: "#4a98c8"
  on-primary: "#002838"
  primary-container: "#1a5068"
  on-primary-container: "#a0d0e8"
  # Secondary group
  secondary: "#406070"
  on-secondary: "#ffffff"
  secondary-container: "#203040"
  on-secondary-container: "#a0c0d0"
  # Tertiary group
  tertiary: "#38b098"
  on-tertiary: "#002820"
  tertiary-container: "#0a5040"
  on-tertiary-container: "#90d8c0"
  # Error group
  error: "#aa3333"
  on-error: "#ffffff"
  error-container: "#6c1410"
  on-error-container: "#f0c0c0"
  # Background & surface
  background: "#0e1a26"
  on-background: "#b8b8c8"
  surface: "#0c1620"
  on-surface: "#a0a0b8"
  surface-variant: "#0c1620"
  on-surface-variant: "#607080"
  surface-dim: "#060e18"
  surface-bright: "#1a2838"
  surface-container-lowest: "#040a10"
  surface-container-low: "#142838"
  surface-container: "#102030"
  surface-container-high: "#162838"
  surface-container-highest: "#1a3040"
  # Outline
  outline: "#485868"
  outline-variant: "#d0e0f01a"
  # Inverse
  inverse-surface: "#0d141c"
  inverse-on-surface: "#b8b8c8"
  inverse-primary: "#1a5068"
  # Utility
  scrim: "#000000"
  shadow: "#000000"
  # Custom tokens
  text-primary: "#b8b8c8"
  text-secondary: "#607080"
  red: "#aa3333"
  on-red: "#ffffff"
  yellow: "#cc9040"
  on-yellow: "#000000"
