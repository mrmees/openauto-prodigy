# Connected Device theme — colors are updated live when Android Auto
# sends UiConfigRequest theming tokens from the phone's Material You palette.
# This file doubles as a persistent cache of the last-received colors.
# On first launch (before any phone connection), uses a Material You-inspired
# teal palette as the default. Once a phone connects, colors are overwritten.
id: connected-device
name: Connected Device
version: 2.0.0
font_family: "Lato"

# Day mode colors — Material You teal/blue default palette
day:
  background: "#1c1b1f"
  primary: "#80cbc4"
  surface_variant: "#2d2d32"
  on_surface: "#e6e1e5"
  text_primary: "#f0f0f0"
  text_secondary: "#a0a0a0"
  surface_container_low: "#26383c"
  surface: "#252530"
  outline_variant: "#ffffff20"
  inverse_surface: "#e6e1e5"
  inverse_on_surface: "#1c1b1f"
  outline: "#938f99"
  red: "#f2b8b5"
  on_red: "#601410"
  yellow: "#FFD54F"
  on_yellow: "#1c1b1f"

# Night mode colors — dimmer teal variant
night:
  background: "#121215"
  primary: "#4db6ac"
  surface_variant: "#1e1e24"
  on_surface: "#c9c5ca"
  text_primary: "#d0d0d0"
  text_secondary: "#808080"
  surface_container_low: "#1a2a2e"
  surface: "#1a1a22"
  outline_variant: "#ffffff15"
  inverse_surface: "#c9c5ca"
  inverse_on_surface: "#121215"
  outline: "#74707a"
  red: "#d4837f"
  on_red: "#601410"
  yellow: "#ccaa3f"
  on_yellow: "#121215"
