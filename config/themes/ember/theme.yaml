id: ember
name: Ember
version: 2.0.0
font_family: "Lato"

# Day mode colors — warm amber/orange, classic dashboard feel
day:
  background: "#1e1712"
  primary: "#ff8c42"
  surface_variant: "#2a1e16"
  on_surface: "#e0d0c0"
  text_primary: "#f0e8e0"
  text_secondary: "#a09080"
  surface_container_low: "#2d2018"
  surface: "#2a1e16"
  outline_variant: "#f0e0d026"
  inverse_surface: "#1e1712"
  inverse_on_surface: "#f0e8e0"
  outline: "#887060"
  red: "#cc4444"
  on_red: "#ffffff"
  yellow: "#FFA726"
  on_yellow: "#000000"

# Night mode colors — deeper, reduced intensity
night:
  background: "#120e0a"
  primary: "#cc7035"
  surface_variant: "#1a1410"
  on_surface: "#b0a090"
  text_primary: "#c8c0b8"
  text_secondary: "#706050"
  surface_container_low: "#201810"
  surface: "#1a1410"
  outline_variant: "#f0e0d01a"
  inverse_surface: "#0f0c09"
  inverse_on_surface: "#c8c0b8"
  outline: "#685848"
  red: "#aa3333"
  on_red: "#ffffff"
  yellow: "#cc8520"
  on_yellow: "#000000"
