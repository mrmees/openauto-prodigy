id: ember
name: Ember
version: 2.0.0
font_family: "Lato"

# Day mode colors — warm amber/orange, classic dashboard feel
day:
  background: "#1e1712"
  primary: "#ff8c42"
  surface-variant: "#2a1e16"
  on-surface: "#e0d0c0"
  text-primary: "#f0e8e0"
  text-secondary: "#a09080"
  surface-container-low: "#2d2018"
  surface: "#2a1e16"
  outline-variant: "#f0e0d026"
  inverse-surface: "#1e1712"
  inverse-on-surface: "#f0e8e0"
  outline: "#887060"
  red: "#cc4444"
  on-red: "#ffffff"
  yellow: "#FFA726"
  on-yellow: "#000000"

# Night mode colors — deeper, reduced intensity
night:
  background: "#120e0a"
  primary: "#cc7035"
  surface-variant: "#1a1410"
  on-surface: "#b0a090"
  text-primary: "#c8c0b8"
  text-secondary: "#706050"
  surface-container-low: "#201810"
  surface: "#1a1410"
  outline-variant: "#f0e0d01a"
  inverse-surface: "#0f0c09"
  inverse-on-surface: "#c8c0b8"
  outline: "#685848"
  red: "#aa3333"
  on-red: "#ffffff"
  yellow: "#cc8520"
  on-yellow: "#000000"
