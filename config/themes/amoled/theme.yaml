id: amoled
name: AMOLED
version: 2.0.0
font_family: "Lato"

# Day mode colors — pure black, minimal accent
day:
  background: "#000000"
  primary: "#4fc3f7"
  surface-variant: "#0a0a0a"
  on-surface: "#d0d0d0"
  text-primary: "#ffffff"
  text-secondary: "#808080"
  surface-container-low: "#0f0f0f"
  surface: "#0a0a0a"
  outline-variant: "#ffffff1a"
  inverse-surface: "#000000"
  inverse-on-surface: "#ffffff"
  outline: "#555555"
  red: "#F44336"
  on-red: "#ffffff"
  yellow: "#FF9800"
  on-yellow: "#000000"

# Night mode colors — identical to day (pure black needs no dimming)
night:
  background: "#000000"
  primary: "#4fc3f7"
  surface-variant: "#0a0a0a"
  on-surface: "#d0d0d0"
  text-primary: "#ffffff"
  text-secondary: "#808080"
  surface-container-low: "#0f0f0f"
  surface: "#0a0a0a"
  outline-variant: "#ffffff1a"
  inverse-surface: "#000000"
  inverse-on-surface: "#ffffff"
  outline: "#555555"
  red: "#F44336"
  on-red: "#ffffff"
  yellow: "#FF9800"
  on-yellow: "#000000"
