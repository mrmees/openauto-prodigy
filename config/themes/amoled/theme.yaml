id: amoled
name: AMOLED
version: 2.0.0
font_family: "Lato"

# Day mode colors — pure black, minimal accent
day:
  # Primary group
  primary: "#4fc3f7"
  on-primary: "#003544"
  primary-container: "#1a6880"
  on-primary-container: "#c0e8f8"
  # Secondary group
  secondary: "#4a5560"
  on-secondary: "#ffffff"
  secondary-container: "#2a3038"
  on-secondary-container: "#c0c8d0"
  # Tertiary group
  tertiary: "#7986cb"
  on-tertiary: "#ffffff"
  tertiary-container: "#3949ab"
  on-tertiary-container: "#c5cae9"
  # Error group
  error: "#F44336"
  on-error: "#ffffff"
  error-container: "#93000a"
  on-error-container: "#ffdad6"
  # Background & surface
  background: "#000000"
  on-background: "#ffffff"
  surface: "#0a0a0a"
  on-surface: "#d0d0d0"
  surface-variant: "#0a0a0a"
  on-surface-variant: "#808080"
  surface-dim: "#000000"
  surface-bright: "#1a1a1a"
  surface-container-lowest: "#000000"
  surface-container-low: "#0f0f0f"
  surface-container: "#141414"
  surface-container-high: "#1c1c1c"
  surface-container-highest: "#242424"
  # Outline
  outline: "#555555"
  outline-variant: "#ffffff1a"
  # Inverse
  inverse-surface: "#000000"
  inverse-on-surface: "#ffffff"
  inverse-primary: "#1a6880"
  # Utility
  scrim: "#000000"
  shadow: "#000000"
  # Custom tokens
  text-primary: "#ffffff"
  text-secondary: "#808080"
  red: "#F44336"
  on-red: "#ffffff"
  yellow: "#FF9800"
  on-yellow: "#000000"

# Night mode colors — identical to day (pure black needs no dimming)
night:
  # Primary group
  primary: "#4fc3f7"
  on-primary: "#003544"
  primary-container: "#1a6880"
  on-primary-container: "#c0e8f8"
  # Secondary group
  secondary: "#4a5560"
  on-secondary: "#ffffff"
  secondary-container: "#2a3038"
  on-secondary-container: "#c0c8d0"
  # Tertiary group
  tertiary: "#7986cb"
  on-tertiary: "#ffffff"
  tertiary-container: "#3949ab"
  on-tertiary-container: "#c5cae9"
  # Error group
  error: "#F44336"
  on-error: "#ffffff"
  error-container: "#93000a"
  on-error-container: "#ffdad6"
  # Background & surface
  background: "#000000"
  on-background: "#ffffff"
  surface: "#0a0a0a"
  on-surface: "#d0d0d0"
  surface-variant: "#0a0a0a"
  on-surface-variant: "#808080"
  surface-dim: "#000000"
  surface-bright: "#1a1a1a"
  surface-container-lowest: "#000000"
  surface-container-low: "#0f0f0f"
  surface-container: "#141414"
  surface-container-high: "#1c1c1c"
  surface-container-highest: "#242424"
  # Outline
  outline: "#555555"
  outline-variant: "#ffffff1a"
  # Inverse
  inverse-surface: "#000000"
  inverse-on-surface: "#ffffff"
  inverse-primary: "#1a6880"
  # Utility
  scrim: "#000000"
  shadow: "#000000"
  # Custom tokens
  text-primary: "#ffffff"
  text-secondary: "#808080"
  red: "#F44336"
  on-red: "#ffffff"
  yellow: "#FF9800"
  on-yellow: "#000000"
