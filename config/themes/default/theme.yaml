id: default
name: Default Theme
version: 2.0.0
font_family: "Lato"

# Day mode colors — AA wire token names
day:
  background: "#1a1a2e"
  primary: "#e94560"
  surface-variant: "#16213e"
  on-surface: "#e0e0e0"
  text-primary: "#ffffff"
  text-secondary: "#a0a0a0"
  surface-container-low: "#0f3460"
  surface: "#16213e"
  outline-variant: "#ffffff26"
  inverse-surface: "#1a1a2e"
  inverse-on-surface: "#ffffff"
  outline: "#808080"
  red: "#cc4444"
  on-red: "#ffffff"
  yellow: "#FF9800"
  on-yellow: "#000000"

# Night mode colors — dimmer, less eye strain
night:
  background: "#0a0a14"
  primary: "#c73650"
  surface-variant: "#0e1729"
  on-surface: "#b0b0b0"
  text-primary: "#c0c0c0"
  text-secondary: "#707070"
  surface-container-low: "#0a2240"
  surface: "#0e1729"
  outline-variant: "#ffffff1a"
  inverse-surface: "#0a0a14"
  inverse-on-surface: "#c0c0c0"
  outline: "#606060"
  red: "#aa3333"
  on-red: "#ffffff"
  yellow: "#cc7a00"
  on-yellow: "#000000"
